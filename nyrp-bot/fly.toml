# fly.toml — New York RP Discord Bot
# Deploy with: fly deploy

app = "nyrp-bot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  NODE_ENV  = "production"

# Persistent volume — SQLite lives here across deploys/restarts
[[mounts]]
  source      = "nyrp_data"
  destination = "/data"

[[vm]]
  cpu_kind   = "shared"
  cpus       = 1
  memory_mb  = 512
