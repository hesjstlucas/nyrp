# fly.toml — New York RP Discord Bot
# Deploy with: fly deploy

app = "nyrp-bot"
primary_region = "iad"

[build]

[env]
  DATA_DIR = "/data"
  NODE_ENV = "production"

# No HTTP server needed — this is a Discord bot
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Persistent volume for SQLite database
[[mounts]]
  source = "nyrp_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
